    <meta charset="UTF-8" />

    <title>TheAbhiPatel - Loading</title>
    <style>
      :root {
        --stroke: #ffffff;
        --glow: #4fc3ff;
        --bg1: #0b0f1a;
        --bg2: #121a2e;
        --cycle: 2s;
        --visible: 0.55;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 30px;
        background: radial-gradient(
          120% 120% at 50% 35%,
          var(--bg2) 0%,
          var(--bg1) 60%,
          #000 100%
        );
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
      }
      .logo {
        width: min(88vw, 820px);
        height: auto;
        overflow: visible;
      }
      .logo path {
        fill: none;
        stroke: var(--stroke);
        stroke-width: 2;
        stroke-linejoin: round;
        stroke-linecap: round;
        filter: drop-shadow(0 0 5px var(--glow));
        stroke-dasharray: var(--dash);
        animation: flow var(--cycle) linear infinite;
        animation-delay: var(--delay, 0s);
      }
      @keyframes flow {
        from {
          stroke-dashoffset: 0;
        }
        to {
          stroke-dashoffset: var(--len);
        }
      }
      .label {
        color: #6f7d99;
        font-size: 13px;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .dots {
        display: inline-flex;
        gap: 5px;
      }
      .dots i {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #6f7d99;
        animation: pulse 1.2s ease-in-out infinite;
      }
      .dots i:nth-child(2) {
        animation-delay: 0.2s;
      }
      .dots i:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.25;
          transform: translateY(0);
        }
        50% {
          opacity: 1;
          transform: translateY(-3px);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .logo path {
          animation: none;
          stroke-dasharray: none;
        }
        .dots i {
          animation: none;
          opacity: 0.7;
        }
      }
    </style>
  </head>

    <div class="label">
      Initializing
      <span class="dots"><i></i><i></i><i></i></span>
    </div>

    <script>
      var visible =
        parseFloat(
          getComputedStyle(document.documentElement).getPropertyValue(
            "--visible",
          ),
        ) || 0.55;

      document.querySelectorAll(".logo path").forEach(function (p, i) {
        var len = Math.ceil(p.getTotalLength());
        var dash = len * visible;
        var gap = len - dash;
        p.style.setProperty("--len", len);
        p.style.setProperty("--dash", dash + " " + gap);
        p.style.setProperty("--delay", i * 0.09 + "s");
      });
    </script>
